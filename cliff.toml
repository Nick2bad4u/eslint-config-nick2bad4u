# git-cliff ~ default configuration file
# https://git-cliff.org/docs/configuration
#
# Lines starting with "#" are comments.
# Configuration options are organized into tables and keys.
# See documentation for more information on available options.
# yaml-language-server: $schema=https://www.schemastore.org/any.json

"$schema"   = "https://gist.githubusercontent.com/Nick2bad4u/5a39907931f3dc6d11ed1149ad4ac549/raw/9ee6a46909c466d15568cde15aa0c132d377655d/generic.schema.json"
description = "Configuration file for git-cliff to generate changelogs based on conventional commits."
name        = "Repository Changelog Configuration"

# Optional: specify the version of the configuration format (not the project version)
version = "1.0.1"

[changelog]
    # template for the changelog header
    header                   = """
<!-- markdownlint-disable -->
<!-- eslint-disable markdown/no-missing-label-refs -->
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
    # template for the changelog body
    # https://keats.github.io/tera/docs/#introduction
    body                     = """
{% if version %}\
  ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
  ## [Unreleased]
{% endif %}
{% if commit_range and commit_range.from and commit_range.to %}
  - <b>Commit Range: ➡️</b> \
  [`{{ commit_range.from | truncate(length=7, end="") }}...{{ commit_range.to | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/compare/{{ commit_range.from }}...{{ commit_range.to }} "View full commit range on GitHub")
{% endif %}
{% if bump_type == "major" %}
  > ⚠️ **Major release:** this version may contain breaking changes. Review upgrade notes carefully.
{% elif bump_type == "minor" %}
  > ✨ **Minor release:** this version adds backwards-compatible features and improvements.
{% elif bump_type == "patch" %}
  > 🩹 **Patch release:** this version focuses on fixes, maintenance, and smaller improvements.
{% endif %}
{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - [`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }} "📝 Diff: {{ commit.statistics.files_changed }} file{% if commit.statistics.files_changed != 1 %}s{% endif %}, ++{{ commit.statistics.additions }} | --{{ commit.statistics.deletions }}") — {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
      {% if commit.breaking %}[**breaking**] {% endif %}\
      {{ commit.message
          | upper_first
          | replace(from="\n", to="\n    ")
          | replace(from=" - ", to="\n    - ")
      }}

  {% endfor %}
{% endfor %}\n
{% for submodule_path, commits in submodule_commits %}
    ### {{ submodule_path | upper_first }}
    {% for group, commits in commits | group_by(attribute="group") %}
        #### {{ group | upper_first }}
        {% for commit in commits %}
          - {{ commit.message | upper_first }}\
        {% endfor %}
    {% endfor %}
{% endfor %}\n
{% if commit.footer %}
  <!-- Use the footer directly -->
  {{ commit.footer | trim | indent(width=8) }}
{% endif %}
"""
    # template for the changelog footer
    footer                   = """
## ⭐ Contributors
Thanks to all the [contributors](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/graphs/contributors) for their hard work!
## 📜 License
This project is licensed under the [MIT License](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/blob/main/LICENSE)
*This changelog was automatically generated with [git-cliff](https://github.com/orhun/git-cliff).*
"""
    # Remove leading and trailing whitespace from the changelog content
    trim                     = true
    protect_breaking_commits = false
    render_always            = true
    # render body even when there are no releases to process
    # render_always = true
    # output file path
    # output = "test.md"

    # postprocessors
    # { pattern = 'your-package-name', replace = "[your-package-name](https://github.com/${remote.github.owner}/${remote.github.repo})" }, # example repository URL replacement
    # replace merge branch commit messages
    [[changelog.postprocessors]]
        pattern = "Merge branch"
        replace = "[chore] Merge Branch"

    [[changelog.postprocessors]]
        pattern = '\[dependency\]'
        replace = "test"

    # replace merge branch commit messages
    [[changelog.postprocessors]]
        pattern = "merge branch"
        replace = "[chore] Merge Branch"

    # Clean up Dependabot messages - remove verbose table content
    [[changelog.postprocessors]]
        pattern = 'Bump the.*?group with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*'
        replace = "[dependency] Update dependency group"

    [[changelog.postprocessors]]
        pattern = 'Bumps the npm-all group.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*'
        replace = "[dependency] Update npm dependencies"

    [[changelog.postprocessors]]
        pattern = '\[dependency\] \[chore\] Bump the.*?with \d+ updates.*?(\n\n|\|.*?\|.*?\n)*'
        replace = "[dependency] Update dependencies"

    # Clean up individual package bump messages
    [[changelog.postprocessors]]
        pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*'
        replace = "[dependency] Update $1"

    [[changelog.postprocessors]]
        pattern = 'Bump ([a-zA-Z0-9@\-\/]+) from.*?to.*?(\n\n.*?)*'
        replace = "[dependency] Update $1"

    [[changelog.postprocessors]]
        pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*'
        replace = "[dependency] Update $1"

    [[changelog.postprocessors]]
        pattern = 'Bump ([a-zA-Z0-9@\-\/]+) to.*?(\n\n.*?)*'
        replace = "[dependency] Update $1"

    [[changelog.postprocessors]]
        pattern = 'Bumps \[([^\]]+)\].*?from.*?to.*?(\n\n.*?)*'
        replace = "[dependency] Update $1"

    # Generic bump message cleanup
    [[changelog.postprocessors]]
        pattern = "Bump"
        replace = "[dependency] Update"

    # Remove git trailers that look noisy in rendered changelog entries
    [[changelog.postprocessors]]
        pattern = '\n\nSigned-off-by:.*'
        replace = ""

[git]
    # parse the commits based on https://www.conventionalcommits.org
    conventional_commits  = true
    # filter out the commits that are not conventional
    filter_unconventional = false
    # process each line of a commit as an individual commit
    split_commits         = false
    # regex for preprocessing the commit messages
    use_branch_tags       = false
    # use branch tags to group commits
    recurse_submodules    = true
    # recurse into submodules to find commits
    # commit_preprocessors = [
    #   # Replace issue numbers
    #   # This regex pattern matches issue references in the format "(optional text #123)"
    #   # and replaces them with a markdown link to the issue, e.g.,
    #   # "[#123](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/123)".
    #   { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/${remote.github.owner}/${remote.github.repo}/issues/${2}))"},
    #   # Example: Check spelling of the commit with the `typos` tool.
    #   # For more information, visit: https://github.com/crate-ci/typos
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    #   # If the spelling is incorrect, it will be automatically fixed.
    #   { pattern = '.*', replace_command = 'typos --write-changes -' },
    # ]
    # filter out the commits that are not matched by commit parsers
    filter_commits        = false
    # sort the tags topologically
    topo_order            = false
    # sort the commits inside sections by oldest/newest order
    # possible values: "oldest" (chronological order) or "newest" (reverse chronological order)
    sort_commits          = "newest"

    # regex for parsing and grouping commits
    # Commit parsers support both raw Unicode Gitmojis and :shortcode: forms
    # from .github/copilot-commit-message-instructions.md.
    # Skip noisy commit types
    [[git.commit_parsers]]
        message = "^Merge branch"
        skip    = true

    [[git.commit_parsers]]
        message = "^Merge pull request"
        skip    = true

    [[git.commit_parsers]]
        message = "^merge branch"
        skip    = true

    [[git.commit_parsers]]
        message = "^chore\\(pr\\)"
        skip    = true

    [[git.commit_parsers]]
        message = "^chore\\(pull\\)"
        skip    = true

    [[git.commit_parsers]]
        message = "^chore\\(release\\): prepare for"
        skip    = true

    # Security-related (keep separate from general dependencies)
    [[git.commit_parsers]]
        message = "^(🔒️|🔒|🔐|🛂|:lock:|:closed_lock_with_key:|:passport_control:)"
        group   = "<!-- 12 -->🛡️ Security"

    [[git.commit_parsers]]
        body  = ".*security.*"
        group = "<!-- 12 -->🛡️ Security"

    [[git.commit_parsers]]
        message = ".*security.*"
        group   = "<!-- 12 -->🛡️ Security"

    # Dependency-related commits (emoji and bot/fallback patterns)
    [[git.commit_parsers]]
        message = "^(⬆️|⬆|⬇️|⬇|📌|➕|➖|:arrow_up:|:arrow_down:|:pushpin:|:heavy_plus_sign:|:heavy_minus_sign:)"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^chore\\(deps.*\\)"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = ".*dependabot.*"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = ".*npm-all.*"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^Bump [a-zA-Z0-9@\\-\\/]+"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^Bump the.*group with \\d+ updates"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^Bumps \\[.*\\]"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^Bumps the.*group with \\d+ updates"
        group   = "<!-- 11 -->📦 Dependencies"

    [[git.commit_parsers]]
        message = "^\\[dependency\\]"
        group   = "<!-- 11 -->📦 Dependencies"

    # Revert commits
    [[git.commit_parsers]]
        message = "^(⏪️|⏪|:rewind:)"
        group   = "<!-- 10 -->⏪ Reverts"

    [[git.commit_parsers]]
        message = "^revert"
        group   = "<!-- 10 -->⏪ Reverts"

    # Commit-type tags (accept any leading emoji/shortcode)
    [[git.commit_parsers]]
        message = "^.*\\[feat\\]"
        group   = "<!-- 0 -->✨ Features"

    [[git.commit_parsers]]
        message = "^.*\\[fix\\]"
        group   = "<!-- 1 -->🛠️ Bug Fixes"

    [[git.commit_parsers]]
        message = "^.*\\[refactor\\]"
        group   = "<!-- 2 -->🚜 Refactor"

    [[git.commit_parsers]]
        message = "^.*\\[docs\\]"
        group   = "<!-- 3 -->📝 Documentation"

    [[git.commit_parsers]]
        message = "^.*\\[perf\\]"
        group   = "<!-- 4 -->⚡ Performance"

    [[git.commit_parsers]]
        message = "^.*\\[style\\]"
        group   = "<!-- 5 -->🎨 Styling"

    [[git.commit_parsers]]
        message = "^.*\\[test\\]"
        group   = "<!-- 6 -->🧪 Testing"

    [[git.commit_parsers]]
        message = "^.*\\[chore\\]"
        group   = "<!-- 7 -->🧹 Chores"

    [[git.commit_parsers]]
        message = "^.*\\[ci\\]"
        group   = "<!-- 8 -->👷 CI/CD"

    [[git.commit_parsers]]
        message = "^.*\\[build\\]"
        group   = "<!-- 9 -->🔧 Build System"

    [[git.commit_parsers]]
        message = "^.*\\[revert\\]"
        group   = "<!-- 10 -->⏪ Reverts"

    # Full Gitmoji mapping fallbacks (for commits without explicit [type])
    [[git.commit_parsers]]
        message = "^(✨|🎉|🌱|🥚|🚩|👔|💥|:sparkles:|:tada:|:seedling:|:egg:|:triangular_flag_on_post:|:necktie:|:boom:)"
        group   = "<!-- 0 -->✨ Features"

    [[git.commit_parsers]]
        message = "^(🐛|🚑️|🚑|🥅|🩹|:bug:|:ambulance:|:goal_net:|:adhesive_bandage:)"
        group   = "<!-- 1 -->🛠️ Bug Fixes"

    [[git.commit_parsers]]
        message = "^(🚜|♻️|♻|🚚|🏗️|🏗|🧱|:tractor:|:recycle:|:truck:|:building_construction:|:bricks:)"
        group   = "<!-- 2 -->🚜 Refactor"

    [[git.commit_parsers]]
        message = "^(📝|✏️|✏|💡|💬|📄|:memo:|:pencil2:|:bulb:|:speech_balloon:|:page_facing_up:)"
        group   = "<!-- 3 -->📝 Documentation"

    [[git.commit_parsers]]
        message = "^(⚡️|⚡|🧵|:zap:|:thread:)"
        group   = "<!-- 4 -->⚡ Performance"

    [[git.commit_parsers]]
        message = "^(🎨|💄|💫|📱|♿️|♿|:art:|:artist_palette:|:lipstick:|:dizzy:|:iphone:|:wheelchair:)"
        group   = "<!-- 5 -->🎨 Styling"

    [[git.commit_parsers]]
        message = "^(🧪|✅|🤡|📸|🦺|:test_tube:|:white_check_mark:|:clown_face:|:camera_flash:|:safety_vest:)"
        group   = "<!-- 6 -->🧪 Testing"

    [[git.commit_parsers]]
        message = "^(🧹|🔥|🚨|🙈|🗑️|🗑|⚰️|🔊|🔇|🍱|🍻|👽️|👽|🔀|💩|:broom:|:fire:|:rotating_light:|:see_no_evil:|:wastebasket:|:coffin:|:loud_sound:|:mute:|:bento:|:beers:|:alien:|:twisted_rightwards_arrows:|:poop:)"
        group   = "<!-- 7 -->🧹 Chores"

    [[git.commit_parsers]]
        message = "^(👷|💚|🚧|🚀|🩺|:construction_worker:|:green_heart:|:construction:|:rocket:|:stethoscope:)"
        group   = "<!-- 8 -->👷 CI/CD"

    [[git.commit_parsers]]
        message = "^(🔧|🔨|📦️|📦|:wrench:|:hammer:|:package:)"
        group   = "<!-- 9 -->🔧 Build System"

    # Remaining supported Gitmojis that are best treated as miscellaneous
    [[git.commit_parsers]]
        message = "^(🔖|🌐|📈|🗃️|🗃|👥|🚸|⚗️|⚗|🔍️|🔍|🏷️|🏷|🧐|🧑‍💻|💸|✈️|✈|🦖|:bookmark:|:globe_with_meridians:|:chart_with_upwards_trend:|:card_file_box:|:busts_in_silhouette:|:children_crossing:|:alembic:|:mag:|:label:|:monocle_face:|:technologist:|:money_with_wings:|:airplane:|:t-rex:)"
        group   = "<!-- 13 -->🛠️ Other Changes"

    # Fallback patterns for conventional commits without emojis
    [[git.commit_parsers]]
        message = "^build"
        group   = "<!-- 9 -->🔧 Build System"

    [[git.commit_parsers]]
        message = "^ci"
        group   = "<!-- 8 -->👷 CI/CD"

    [[git.commit_parsers]]
        message = "^docs?"
        group   = "<!-- 3 -->📝 Documentation"

    [[git.commit_parsers]]
        message = "^feat"
        group   = "<!-- 0 -->✨ Features"

    [[git.commit_parsers]]
        message = "^fix"
        group   = "<!-- 1 -->🛠️ Bug Fixes"

    [[git.commit_parsers]]
        message = "^perf"
        group   = "<!-- 4 -->⚡ Performance"

    [[git.commit_parsers]]
        message = "^refactor"
        group   = "<!-- 2 -->🚜 Refactor"

    [[git.commit_parsers]]
        message = "^style"
        group   = "<!-- 5 -->🎨 Styling"

    [[git.commit_parsers]]
        message = "^test"
        group   = "<!-- 6 -->🧪 Testing"

    [[git.commit_parsers]]
        message = "^chore"
        group   = "<!-- 7 -->🧹 Chores"

    # CI/CD file changes
    [[git.commit_parsers]]
        message = ".*\\.ya?ml"
        group   = "<!-- 8 -->👷 CI/CD"

    [[git.commit_parsers]]
        message = ".*workflow.*"
        group   = "<!-- 8 -->👷 CI/CD"

    # Catch-all for miscellaneous changes
    [[git.commit_parsers]]
        message = ".*"
        group   = "<!-- 13 -->🛠️ Other Changes"

[remote]
    # Keep remote metadata lookups disabled by default while still exposing
    # owner/repo values to the changelog template for reusable link generation.
    offline = true

    # GitHub repository metadata used by the changelog template.
    [remote.github]
        owner = "Nick2bad4u"
        repo  = "eslint-config-nick2bad4u"
        # api_url = "https://api.github.com"
        # native_tls = false
